preset_name: five_point_straight_in

# Core PPO runtime
total_timesteps: 50000
seed: 0
cuda: false
learning_rate: 0.0003
anneal_lr: true

# Discounting / advantage
gamma: 0.99
gae_lambda: 0.95

# Rollout / update
num_envs: 4
num_steps: 64
update_epochs: 4
num_minibatches: 4
clip_coef: 0.2
ent_coef: 0.0
vf_coef: 0.5
max_grad_norm: 0.5

# Model
hidden_sizes: [64, 64]

# Evaluation / persistence
eval_frequency: 2048
eval_episodes: 100
run_root_dir: MLAgent/runs/s1
checkpoint_dir: checkpoints
log_dir: logs

